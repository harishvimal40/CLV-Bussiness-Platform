<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAYAN STORES | The Future of Fashion</title>
    <meta http-equiv="refresh" content="5; url=https://clv-bussiness-platform-zzhhr9kdomzmzbcdn2cbdp.streamlit.app/" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&display=swap');

        :root {
            --primary: #cc0000;
            --secondary: #ff4444;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* ── Dynamic Background ── */
        .background-blobs {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(204, 0, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }
        .blob1 { top: -100px; left: -100px; animation-delay: 0s; }
        .blob2 { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(255, 68, 68, 0.1) 0%, transparent 70%); animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* ── Portal Glass Case ── */
        .portal-case {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            padding: 80px 100px;
            border-radius: 40px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: caseEntrance 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes caseEntrance {
            from { opacity: 0; transform: translateY(50px) rotateX(-10deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0deg); }
        }

        .brand-container {
            margin-bottom: 40px;
        }

        .brand-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -6px;
            line-height: 0.85;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .brand-text.highlight {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(204, 0, 0, 0.3);
        }

        .tagline {
            font-size: 1.1rem;
            letter-spacing: 15px;
            color: #ccc;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 20px;
            animation: letterSpacing 3s forwards;
        }

        @keyframes letterSpacing {
            from { letter-spacing: 5px; opacity: 0; }
            to { letter-spacing: 15px; opacity: 1; }
        }

        /* ── Progress Bar ── */
        .progress-box {
            width: 350px;
            margin: 50px auto 0;
        }

        .bar-bg {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute;
            left: 0; top: 0; height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 15px var(--primary);
            animation: fill 5s linear forwards;
        }

        @keyframes fill { to { width: 100%; } }

        .status-text {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
        }

        /* ── Floating Particles ── */
        .particles {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            animation: drift 10s infinite linear;
        }

    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <div class="particles" id="particle-container"></div>

    <div class="portal-case">
        <div class="brand-container">
            <span class="brand-text">RAYAN</span>
            <span class="brand-text highlight">STORES</span>
        </div>
        
        <p class="tagline">AUTHENTIC TEXTILES</p>

        <div class="progress-box">
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <p class="status-text" id="status">Connecting to Hub...</p>
        </div>
    </div>

    <script>
        // Particle generation
        const container = document.getElementById('particle-container');
        for(let i=0; i<30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 10 + 5) + 's';
            p.style.animationDelay = (Math.random() * 5) + 's';
            container.appendChild(p);
        }

        const msgs = ["SYNCING FABRICS...", "ENCRYPTING LAYER...", "OPTIMIZING UI...", "ACCESS GRANTED."];
        let idx = 0;
        const status = document.getElementById('status');
        const interval = setInterval(() => {
            if(idx < msgs.length) {
                status.innerText = msgs[idx];
                idx++;
            } else {
                clearInterval(interval);
            }
        }, 1200);
    </script>
</body>
</html>
