<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayan Stores | Premium Textile Portal</title>
    <meta http-equiv="refresh" content="4; url=https://clv-bussiness-platform-zzhhr9kdomzmzbcdn2cbdp.streamlit.app/" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;900&display=swap');

        :root {
            --primary: #cc0000;
            --dark: #0d0d0d;
            --accent: #ff4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0000 0%, #0d0d0d 100%);
        }

        .portal-container {
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .logo-box {
            margin-bottom: 40px;
        }

        .brand {
            font-family: 'Syncopate', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -4px;
            line-height: 0.8;
            background: linear-gradient(to bottom, #fff 0%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .brand span {
            color: var(--primary);
            -webkit-text-fill-color: var(--primary);
        }

        .tagline {
            font-size: 1rem;
            letter-spacing: 12px;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 50px;
        }

        .loading-bar {
            width: 300px;
            height: 2px;
            background: #222;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .loading-bar::after {
            content: "";
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: slide 2s infinite ease-in-out;
        }

        @keyframes slide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .enter-link {
            display: inline-block;
            margin-top: 40px;
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid var(--primary);
            padding-bottom: 5px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: 0.3s;
            opacity: 0.7;
        }

        .enter-link:hover {
            opacity: 1;
            letter-spacing: 2px;
        }

        /* ── Background Grid ── */
        .grid {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(204, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(204, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            perspective: 1000px;
            transform: rotateX(60deg) translateY(-200px);
            opacity: 0.3;
        }

    </style>
</head>
<body>
    <div class="grid"></div>

    <div class="portal-container">
        <div class="logo-box">
            <h1 class="brand">RAYAN</h1>
            <h1 class="brand"><span>STORES</span></h1>
        </div>
        <p class="tagline">Premium Textiles</p>

        <div class="loading-bar"></div>
        <p class="status-msg">Redirecting to Live AI Core...</p>

        <a href="https://clv-bussiness-platform-zzhhr9kdomzmzbcdn2cbdp.streamlit.app/" class="enter-link">Fast Lane Access</a>
    </div>

    <script>
        const msgs = ["Initializing Engine...", "Securing Connection...", "Loading Rayan UI...", "Access Granted."];
        let i = 0;
        const status = document.querySelector('.status-msg');
        setInterval(() => {
            if(i < msgs.length) {
                status.innerText = msgs[i];
                i++;
            }
        }, 800);
    </script>
</body>
</html>
