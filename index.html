<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saravana Super Store | Best Prices Always</title>
    <meta http-equiv="refresh" content="3; url=https://clv-bussiness-platform-zzhhr9kdomzmzbcdn2cbdp.streamlit.app/" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        :root {
            --primary: #ffd700; /* Gold Yellow */
            --secondary: #e60000; /* Bright Red */
            --dark: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--primary);
            color: var(--secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ffd700 0%, #ffdf33 100%);
        }

        /* ── Dynamic background elements ── */
        .shape {
            position: absolute;
            background: rgba(230, 0, 0, 0.05);
            border-radius: 50%;
            z-index: 1;
        }

        .portal-card {
            background: #ffffff;
            padding: 50px 70px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            border: 8px solid var(--secondary);
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 650px;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .brand-name {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 10px;
        }

        .brand-sub {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .loading-container {
            margin: 30px 0;
        }

        .big-loader {
            width: 100%;
            height: 15px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: var(--secondary);
            animation: fill 3s linear forwards;
        }

        @keyframes fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .info-text {
            font-weight: 700;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #555;
        }

        .btn-direct {
            display: inline-block;
            margin-top: 30px;
            background: var(--secondary);
            color: #fff;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            transition: 0.3s;
            border: 4px solid var(--primary);
        }

        .btn-direct:hover {
            transform: scale(1.1);
            background: var(--dark);
        }

        /* ── Celebration Sparkles ── */
        .celebration { font-size: 2rem; margin-bottom: 10px; }

    </style>
</head>
<body>
    <div class="shape" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="shape" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>

    <div class="portal-card">
        <div class="celebration">🎊 🏪 🎊</div>
        <h1 class="brand-name">SARAVANA</h1>
        <h1 class="brand-name" style="font-size: 2.2rem; color: #333;">SUPER STORE</h1>
        <p class="brand-sub">LOWEST PRICE • HIGHEST QUALITY</p>

        <div class="loading-container">
            <div class="big-loader">
                <div class="progress"></div>
            </div>
            <p class="info-text">Connecting to Saravana Stores Digital Express...</p>
        </div>

        <a href="https://clv-bussiness-platform-zzhhr9kdomzmzbcdn2cbdp.streamlit.app/" class="btn-direct">Enter Super Mart</a>
    </div>

    <script>
        const statusEl = document.querySelector('.info-text');
        const msgs = [
            "Opening Groceries Section...",
            "Loading Textile Mega-Deals...",
            "Securing Customer Connection...",
            "Welcome to Saravana Super Store!"
        ];
        let idx = 0;
        setInterval(() => {
            if (idx < msgs.length) {
                statusEl.innerText = msgs[idx];
                idx++;
            }
        }, 800);
    </script>
</body>
</html>
